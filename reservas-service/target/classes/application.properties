# Server Configuration
server.port=8083
spring.application.name=reservas-service

# Especifica la base de datos correcta
spring.data.mongodb.database=reservas_db
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017

# O usa el URI directamente (más seguro)
# spring.data.mongodb.uri=mongodb://localhost:27017/reservas_db

# ===== EUREKA CONFIGURATION =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===== FEIGN CONFIGURATION =====
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000

# ===== ACTUATOR CONFIGURATION =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true