spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=usuarios-service
spring.cloud.gateway.routes[0].uri=lb://USUARIOS-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.routes[1].id=peliculas-service
spring.cloud.gateway.routes[1].uri=lb://PELICULAS-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/peliculas/**

spring.cloud.gateway.routes[2].id=reservas-service
spring.cloud.gateway.routes[2].uri=lb://RESERVAS-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/reservas/**

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
